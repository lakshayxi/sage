name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Installs from the committed lock file (requirements-lock.txt) for a
      # reproducible environment -- not `pip install -e ".[dev]"` directly
      # against pyproject.toml's `>=` floors, which would silently resolve
      # to whatever the latest compatible transitive versions happen to be
      # on the day CI runs, defeating the point of having a lock file at
      # all. `--no-deps` on the second install: dependencies already came
      # from the lock file; this step only registers the `sage` package
      # itself (editable) so `sage`/`api`/`eval`/`config` are importable.
      - name: Install dependencies
        run: |
          pip install -r requirements-lock.txt
          pip install -e . --no-deps

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      # tests/test_local_embedder.py includes one real-model integration
      # test that downloads BAAI/bge-small-en-v1.5 (~130MB) on first run --
      # cache it so subsequent CI runs don't re-download every time.
      - name: Cache sentence-transformers models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-models-${{ runner.os }}

      # No GEMINI_API_KEY needed -- the Gemini client is fully faked in
      # tests (tests/fakes.py). This does NOT run eval/run_eval.py itself
      # (live Gemini calls, real per-run cost, no offline mode) -- only its
      # pure, network-free scoring-logic unit tests
      # (tests/test_eval_scoring.py) run here, as part of this same
      # `pytest tests/` invocation. See eval/run_eval.py's module docstring
      # for how to run the live harness manually.
      - name: Run tests
        run: python -m pytest tests/

  frontend:
    name: Frontend (lint + test + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # frontend/src/api/chat.test.ts -- the /chat/stream SSE parser (query,
      # session token, and demo key never in the URL; frame reassembly
      # across arbitrary chunk/UTF-8 boundaries; a stream that ends without
      # a terminal event still resolves the caller instead of hanging).
      - name: Test
        run: npm run test

      # `npm run build` runs `tsc -b` (typecheck) before `vite build`, so
      # this covers both in one step -- see frontend/package.json.
      - name: Typecheck + build
        run: npm run build
